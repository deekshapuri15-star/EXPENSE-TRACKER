<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
       .block {
        display :flex;
        justify-content :center ;
        gap :20px;
        align-item : flex-start ;
        }
        .table123{
        text-align: center ;
        }
        h2{
        text-align:center;
        }
        h3 {
         margin-top: 300px;
         }


         table {
            border-collapse: collapse;
            margin: 0 auto;
        }
        .block123{
        text-align :center;
        font-size:32px;
        margin-top: 300px;
        }
        th, td {
        border: 1px solid #999;
        padding: 8px 15px;
        }

    </style>
</head>
<body>
 <h1 style="text-align : center">LOGIN</h1>
    <form method="post">
        <div style="text-align: center;">
    <label>EXPENSE</label><br><br>
    <input type = "text"  name ='expense' placeholder = "enter ur expense"><br><br>
           <label>amount</label><br><br>
    <input type = "text"  name ='amount'placeholder = "enter ur amount"><br><br>
            <label>category</label><br><br>
            <input type = "text"  name ='category'placeholder = "enter ur category"><br><br>
            <input type="submit" value="login">
        </div>
    </form>
 <h2>Expenses</h2>
 <div class ="block">
 <div  class ="table123">
 <table>
       <tr>
           <th>expenses</th>
           <th>amount</th>
           <th>category</th>
       </tr>
       {% for row in expenses %}

       <tr>

           <td> {{ row[0]}}</td>
           <td> {{ row[1]}}</td>
           <td> {{ row[2]}}</td>
       </tr>
       {% endfor %}

   </table>
     </div>

        <h3 class ="block123">TOTAL SPEND {{total}}</h3>
       <div class ="table123">
       <h4> CATEGORY WISE SPENDINGS</h4>


       <table>
           <tr>
           <th>category</th>
           <th>amount</th>
           </tr>
             {% for cat_row in category_total %}
           <tr>
               <th>{{cat_row[0] }}</th>
            <th>{{cat_row[1] }}</th>
           </tr>
              {% endfor %}
       </table>

   </table>
</div>
</div>


</body>
</html>
